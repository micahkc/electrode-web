name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Dev Book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mdBook
        run: cargo install mdbook --version "$(awk -F= '/^MDBOOK_VERSION=/{print $2}' tools.lock)" --locked
      - name: Resolve docs version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="manual"
          fi
          echo "DOCS_VERSION=${version}" >> "${GITHUB_ENV}"
      - name: Prepare gh-pages worktree
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pages_dir="${RUNNER_TEMP}/electrode_web_docs"
          rm -rf "${pages_dir}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add "${pages_dir}" gh-pages
          else
            git worktree add --detach "${pages_dir}"
            git -C "${pages_dir}" switch --orphan gh-pages
            git -C "${pages_dir}" rm -rf . || true
          fi

          echo "PAGES_DIR=${pages_dir}" >> "${GITHUB_ENV}"
      - name: Generate docs
        run: cargo run --locked --manifest-path xtask/Cargo.toml -- docs --version "${DOCS_VERSION}" --out-dir "${PAGES_DIR}"
      - name: Publish docs
        shell: bash
        run: |
          set -euxo pipefail
          cd "${PAGES_DIR}"
          git add -A
          if git diff --cached --quiet; then
            echo "No docs changes to publish."
          else
            git commit -m "Update dev docs for ${DOCS_VERSION}"
            git push origin HEAD:gh-pages
          fi
